<section id="experience" class="experience section" #experienceSection>
  <div class="container">
    <div class="section-inner" [class.section-inner--visible]="isVisible()">
      <h2 class="section-heading">
        Work<span class="text-stroke">History</span>
      </h2>
    <div class="section-divider section-divider--teal"></div>

    <div class="experience__timeline-wrapper">
      <div class="experience__timeline-line"></div>
      
      <div class="experience__list">
        @for (exp of experiences(); track exp.company; let i = $index) {
          <div 
            class="experience__item" 
            [class.experience__item--visible]="isVisible()"
            [style.animation-delay]="i * 150 + 'ms'"
            [attr.data-color]="exp.color"
          >
            <!-- Timeline Dot / Icon wrapper -->
            <div class="experience__dot-container">
              <div class="experience__dot">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-briefcase">
                  <path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                  <rect width="20" height="14" x="2" y="6" rx="2"/>
                </svg>
              </div>
            </div>

            <!-- Card Content -->
            <div class="experience__card">
              <div class="experience__card-header">
                <div>
                  <h3 class="experience__role">{{ exp.role }}</h3>
                  <div class="experience__company">{{ exp.company }}</div>
                </div>
                <span class="experience__period">
                  {{ exp.period }}
                </span>
              </div>
              
              <p class="experience__description">
                {{ exp.description }}
              </p>
              
              @if (exp.tags && exp.tags.length > 0) {
                <div class="item-tags">
                  @for (tag of exp.tags; track tag) {
                    <span class="item-tag">
                      {{ tag }}
                    </span>
                  }
                </div>
              }
            </div>
          </div>
        }
      </div>
    </div>
  </div>
  </div>
</section>
