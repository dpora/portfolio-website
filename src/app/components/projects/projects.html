<section id="projects" class="projects section" #projectsSection>
  <div class="container">
    <div class="section-inner" [class.section-inner--visible]="isVisible()">
      
      <h2 class="section-heading">
        Selected<span class="text-stroke">Projects</span>
      </h2>
      <div class="section-divider"></div>

      <div class="projects__grid">
        @for (project of projects(); track project.title; let i = $index) {
          <article 
            class="projects__card"
            [class.projects__card--visible]="isVisible()"
            [style.animation-delay]="i * 100 + 'ms'"
            [attr.data-color]="project.color"
          >
            <div class="projects__color-bar"></div>
            
            <h3 class="projects__title">{{ project.title }}</h3>
            <p class="projects__description">{{ project.description }}</p>

            <div class="item-tags">
              @for (tag of project.tags; track tag) {
                <span class="item-tag">{{ tag }}</span>
              }
            </div>

            <div class="projects__links">
              @if (project.github) {
                <a [href]="project.github" class="projects__link" target="_blank" rel="noopener noreferrer">
                  <!-- GitHub Icon -->
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-github">
                    <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
                    <path d="M9 18c-4.51 2-5-2-7-2"/>
                  </svg>
                  Code
                </a>
              }
              @if (project.live) {
                <a [href]="project.live" class="projects__link" target="_blank" rel="noopener noreferrer">
                  <!-- External Link Icon -->
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-external-link">
                    <path d="M15 3h6v6"/>
                    <path d="M10 14 21 3"/>
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                  </svg>
                  Live
                </a>
              }
            </div>
          </article>
        }
      </div>
    </div>
  </div>
</section>
